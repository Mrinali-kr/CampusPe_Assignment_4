<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sage Chat UI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
</head>

<body class="dark">

<div class="app">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="toggle">🌗 Toggle Theme</div>
    <button class="btn w-100 mb-3">+ New Chat</button>
    <div class="history">
      <p>Chat 1</p>
      <p>Chat 2</p>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-container">

    <!-- Welcome -->
    <div class="welcome" id="welcome">
      <h2>Welcome back 🌿</h2>
      <p>What’s on your mind today?</p>

      <div class="cards">
        <div class="card">Explain AI simply</div>
        <div class="card">Give project ideas</div>
        <div class="card">Debug my code</div>
        <div class="card">Write something creative</div>
      </div>
    </div>

    <!-- Messages -->
    <div class="messages" id="messages"></div>

    <!-- Typing -->
    <div class="typing" id="typing">AI is typing...</div>

    <!-- Input -->
    <div class="input-area">
      <textarea id="input" placeholder="Type your thoughts..."></textarea>
      <button id="send" disabled>Send</button>
    </div>

  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/chat.js"></script>

</body>
</html>
